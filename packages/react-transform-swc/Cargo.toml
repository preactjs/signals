[package]
name = "signals-react-transform-swc"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "SWC plugin to transform React components for Preact Signals"
homepage = "https://preactjs.com"
repository = "https://github.com/preactjs/signals"
rust-version = "1.70"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
serde = { version = "1.0.203", features = ["derive"] }
serde_json = "1.0.117"
swc_core = { version = "=58.0.1", features = ["ecma_plugin_transform"] }

[profile.release]
codegen-units = 1
lto = true
opt-level = "s"
strip = "symbols"
